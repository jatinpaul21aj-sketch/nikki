<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Kakinada Aditya Degree College</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .page-head { padding: 56px 0 0; }
  .page-head h1 { font-family: var(--font-display); font-size: 40px; font-weight: 600; margin-top: 14px; }
  .page-head p { color: var(--paper-1); margin-top: 14px; max-width: 540px; }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 56px;
  }

  .info-card {
    background: var(--ink-1);
    border: 1px solid var(--ink-3);
    border-radius: var(--radius);
    padding: 30px;
  }
  .info-row {
    display: flex;
    gap: 16px;
    padding: 18px 0;
    border-bottom: 1px dashed var(--ink-3);
  }
  .info-row:first-child { padding-top: 0; }
  .info-row:last-child { border-bottom: none; }
  .info-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--gold-soft);
    color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .info-row h4 { font-size: 14.5px; font-weight: 600; color: var(--paper-0); }
  .info-row p { font-size: 13.5px; color: var(--paper-1); margin-top: 4px; }
  .info-row a { color: var(--paper-1); }
  .info-row a:hover { color: var(--gold); }

  .hours-table { width: 100%; margin-top: 8px; }
  .hours-table td { font-size: 13px; color: var(--paper-1); padding: 4px 0; }
  .hours-table td:first-child { color: var(--paper-0); }
  .hours-table td:last-child { text-align: right; font-family: var(--font-mono); }

  /* form */
  .form-card {
    background: var(--ink-1);
    border: 1px solid var(--ink-3);
    border-radius: var(--radius);
    padding: 36px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 13px; color: var(--paper-1); font-weight: 500; }
  .field input, .field select, .field textarea {
    background: var(--ink-0);
    border: 1px solid var(--ink-3);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--paper-0);
    font-family: var(--font-body);
    font-size: 14.5px;
    transition: border-color 0.2s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--gold);
    outline: none;
  }
  .field textarea { resize: vertical; min-height: 110px; }
  .form-card .btn-primary { margin-top: 6px; width: 100%; justify-content: center; padding: 13px; font-size: 15px; }

  .map-strip {
    margin-top: 64px;
    border: 1px solid var(--ink-3);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .map-strip iframe { width: 100%; height: 320px; display: block; border: 0; filter: grayscale(0.3) invert(0.92) contrast(0.9); }

  @media (max-width: 900px) {
    .contact-grid { grid-template-columns: 1fr; gap: 32px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="index.html" class="brand">
      <span class="brand-mark">KA</span>
      <span class="brand-text">
        <span class="name">Kakinada Aditya<br>Degree College</span>
      </span>
    </a>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="records.html">Student Records</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
    <div class="nav-cta">
      <a href="contact.html" class="btn btn-ghost">Visit Campus</a>
      <a href="records.html" class="btn btn-primary">Staff Login</a>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="page-head">
    <div class="eyebrow">Contact</div>
    <h1>Get in touch.</h1>
    <p>For admissions, attendance queries, or to speak with a class teacher, reach the administrative office directly.</p>
  </div>
</div>

<section>
  <div class="wrap">
    <div class="contact-grid">
      <div>
        <div class="info-card">
          <div class="info-row">
            <div class="info-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 1 1 18 0z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </div>
            <div><h4>Campus Address</h4><p>Kakinada Aditya Degree College<br>Ramaraopeta, Kakinada<br>Andhra Pradesh – 533004</p></div>
          </div>
          <div class="info-row">
            <div class="info-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.11 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.91.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z" stroke="currentColor" stroke-width="2"/></svg>
            </div>
            <div><h4>Phone</h4><p><a href="tel:+918842234567">+91 884 223 4567</a> — Office<br><a href="tel:+918842234568">+91 884 223 4568</a> — Admissions</p></div>
          </div>
          <div class="info-row">
            <div class="info-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4h16v16H4z" stroke="currentColor" stroke-width="2"/><path d="M4 6l8 7 8-7" stroke="currentColor" stroke-width="2"/></svg>
            </div>
            <div><h4>Email</h4><p><a href="mailto:office@kakinadaadityacollege.edu.in">office@kakinadaadityacollege.edu.in</a><br><a href="mailto:admissions@kakinadaadityacollege.edu.in">admissions@kakinadaadityacollege.edu.in</a></p></div>
          </div>
          <div class="info-row">
            <div class="info-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </div>
            <div>
              <h4>Office Hours</h4>
              <table class="hours-table">
                <tr><td>Monday – Saturday</td><td>9:30 AM – 4:30 PM</td></tr>
                <tr><td>Sunday</td><td>Closed</td></tr>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="form-card">
        <h3 style="font-family: var(--font-display); font-size: 20px; font-weight: 600; margin-bottom: 6px;">Send a message</h3>
        <p style="font-size: 13.5px; color: var(--paper-1); margin-bottom: 24px;">The office responds within one working day.</p>
        <form>
          <div class="form-row">
            <div class="field">
              <label for="name">Full name</label>
              <input id="name" type="text" placeholder="Your name" required>
            </div>
            <div class="field">
              <label for="phone">Phone number</label>
              <input id="phone" type="tel" placeholder="+91 00000 00000">
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label for="email">Email address</label>
              <input id="email" type="email" placeholder="you@example.com" required>
            </div>
            <div class="field">
              <label for="reason">Reason for contact</label>
              <select id="reason">
                <option>Admissions enquiry</option>
                <option>Attendance query</option>
                <option>Speak with a class teacher</option>
                <option>General enquiry</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="field full">
              <label for="message">Message</label>
              <textarea id="message" placeholder="Write your message here"></textarea>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Send message</button>
        </form>
      </div>
    </div>

    <div class="map-strip">
      <iframe
        src="https://www.google.com/maps?q=Kakinada,Andhra+Pradesh&output=embed"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Map showing Kakinada, Andhra Pradesh">
      </iframe>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-grid">
      <div class="footer-col footer-brand">
        <h4>Kakinada Aditya Degree College</h4>
        <p>Affiliated to Adikavi Nannaya University, offering UG programmes in Arts, Science, and Commerce since 1998.</p>
      </div>
      <div class="footer-col">
        <h4>Navigate</h4>
        <a href="index.html">Home</a>
        <a href="records.html">Student Records</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer-col">
        <h4>Records</h4>
        <a href="records.html#attendance">Attendance</a>
        <a href="records.html#holidays">Holiday Calendar</a>
        <a href="records.html#remarks">Remarks</a>
      </div>
      <div class="footer-col">
        <h4>Contact</h4>
        <p>Ramaraopeta, Kakinada<br>Andhra Pradesh – 533004</p>
        <p>office@kakinadaadityacollege.edu.in</p>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2026 Kakinada Aditya Degree College</span>
      <span>Demo interface — sample data shown</span>
    </div>
  </div>
</footer>

<script src="assets/main.js"></script>
<script>
  document.querySelector('form').addEventListener('submit', function (e) {
    e.preventDefault();
    alert('This is a static demo — form submission is not yet connected to a server.');
  });
</script>
</body>
</html>
